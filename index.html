
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sideline Lacrosse Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:#1e293b;padding:16px;font-size:24px;font-weight:bold}
.container{padding:16px}
.card{background:#1e293b;padding:16px;border-radius:10px;margin-bottom:16px}
select,input,button,textarea{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{background:#38bdf8;color:black;font-weight:bold;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.playerCard{background:#334155;padding:10px;border-radius:8px;margin:6px 0;display:flex;align-items:center}
.playerCard img{width:50px;height:50px;border-radius:50%;margin-right:10px}
.swingBadge{background:#f59e0b;color:black;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;font-weight:bold}
.score{font-size:42px;text-align:center}
.bigButton{font-size:22px;padding:14px}
canvas{background:#166534;border-radius:10px;width:100%}
</style>
</head>

<body>

<header>Sideline Lacrosse Stats</header>

<div class="container">

<div class="card">
<h2>Team Selector</h2>

<select id="country"></select>
<select id="state"></select>
<select id="school"></select>
<select id="level">
<option>Varsity</option>
<option>JV</option>
</select>

<button onclick="loadRoster()">Load Team</button>

</div>


<div class="card">
<h2>Scoreboard</h2>

<div class="grid">

<div>
Home
<div id="homeScore" class="score">0</div>
<button class="bigButton" onclick="score('home')">GOAL</button>
</div>

<div>
Clock
<div id="clock" class="score">12:00</div>
<button onclick="startClock()">Start</button>
<button onclick="stopClock()">Stop</button>
</div>

<div>
Away
<div id="awayScore" class="score">0</div>
<button class="bigButton" onclick="score('away')">GOAL</button>
</div>

</div>

</div>


<div class="card">
<h2>Roster</h2>
<div id="roster"></div>
</div>


<div class="card">
<h2>Shot Map</h2>
<canvas id="field" width="600" height="350"></canvas>
</div>


<div class="card">
<h2>Goalie Stats</h2>

<label>Saves</label>
<input id="saves" type="number" value="0">

<label>Goals Allowed</label>
<input id="ga" type="number" value="0">

<button onclick="updateSavePct()">Calculate Save %</button>

<div id="savePct"></div>

</div>


<div class="card">
<h2>Stat Leaders</h2>
<div id="leaders"></div>
</div>


<div class="card">
<h2>Game Recap (TeamSnap)</h2>
<textarea id="recap" rows="8"></textarea>
<button onclick="generateRecap()">Generate Recap</button>
</div>


</div>


<script src="schools.js"></script>
<script src="rosters.js"></script>

<script>

let clock=720
let timer=null
let stats={}
let currentPlayers=[]
let gameRoster=new Set()
let selectingRoster=false

function populate(){

let c=document.getElementById("country")

Object.keys(schools).forEach(x=>{

let o=document.createElement("option")
o.value=x
o.textContent=x
c.appendChild(o)

})

populateStates()

}

function populateStates(){

let country=countryEl().value
let s=stateEl()

s.innerHTML=""

Object.keys(schools[country]).forEach(x=>{

let o=document.createElement("option")
o.value=x
o.textContent=x
s.appendChild(o)

})

populateSchools()

}

function populateSchools(){

let country=countryEl().value
let state=stateEl().value
let sc=schoolEl()

sc.innerHTML=""

schools[country][state].forEach(x=>{

let o=document.createElement("option")
o.value=x
o.textContent=x
sc.appendChild(o)

})

}

function countryEl(){return document.getElementById("country")}
function stateEl(){return document.getElementById("state")}
function schoolEl(){return document.getElementById("school")}

function swingStoreKey(name){
return countryEl().value+"|"+stateEl().value+"|"+schoolEl().value+"|"+name
}

function getSwingTags(){
return JSON.parse(localStorage.getItem("swingTags")||"{}")
}

function setSwingTags(tags){
localStorage.setItem("swingTags",JSON.stringify(tags))
}

function isSwing(player){
if(player.swing)return true
return !!getSwingTags()[swingStoreKey(player.name)]
}

function toggleSwing(name){
let tags=getSwingTags()
let k=swingStoreKey(name)
if(tags[k])delete tags[k]
else tags[k]=true
setSwingTags(tags)
rebuildCurrentPlayers()
renderRoster()
}

function gameRosterKey(){
return "gameRoster|"+countryEl().value+"|"+stateEl().value+"|"+schoolEl().value+"|"+level.value
}

function loadGameRoster(){
let stored=localStorage.getItem(gameRosterKey())
gameRoster=new Set(stored?JSON.parse(stored):[])
}

function persistGameRoster(){
localStorage.setItem(gameRosterKey(),JSON.stringify([...gameRoster]))
}

function toggleGameRoster(name){
if(gameRoster.has(name))gameRoster.delete(name)
else gameRoster.add(name)
persistGameRoster()
}

function saveGameRoster(){
selectingRoster=false
renderRoster()
}

function editGameRoster(){
selectingRoster=true
renderRoster()
}

function clearGameRoster(){
gameRoster.clear()
persistGameRoster()
selectingRoster=true
renderRoster()
}

function rebuildCurrentPlayers(){

let country=countryEl().value
let state=stateEl().value
let school=schoolEl().value
let currentLevel=level.value
let otherLevel=currentLevel=="Varsity"?"JV":"Varsity"

let baseKey=country+"|"+state+"|"+school+"|"
let players=(rosters[baseKey+currentLevel]||[]).slice()

let otherPlayers=rosters[baseKey+otherLevel]||[]
otherPlayers.forEach(p=>{
if(isSwing(p)&&!players.find(x=>x.name===p.name)){
players.push(p)
}
})

currentPlayers=players

}

function loadRoster(){

rebuildCurrentPlayers()
loadGameRoster()
selectingRoster=gameRoster.size===0
renderRoster()

}

function renderRoster(){

let box=document.getElementById("roster")
box.innerHTML=""

let header=document.createElement("div")
header.style.margin="0 0 10px 0"

if(selectingRoster){
header.innerHTML='<b>Select players rostered for this game ('+gameRoster.size+' selected):</b> '
let saveBtn=document.createElement("button")
saveBtn.textContent="Save Game Roster"
saveBtn.style.width="auto"
saveBtn.style.padding="6px 12px"
saveBtn.style.marginLeft="8px"
saveBtn.onclick=saveGameRoster
header.appendChild(saveBtn)
}else{
header.innerHTML='<b>Game Roster ('+gameRoster.size+' players)</b> '
let editBtn=document.createElement("button")
editBtn.textContent="Edit Game Roster"
editBtn.style.width="auto"
editBtn.style.padding="6px 12px"
editBtn.style.marginLeft="8px"
editBtn.onclick=editGameRoster
header.appendChild(editBtn)
let clearBtn=document.createElement("button")
clearBtn.textContent="Clear"
clearBtn.style.width="auto"
clearBtn.style.padding="6px 12px"
clearBtn.style.marginLeft="6px"
clearBtn.style.background="#ef4444"
clearBtn.onclick=clearGameRoster
header.appendChild(clearBtn)
}
box.appendChild(header)

let visible=selectingRoster?currentPlayers:currentPlayers.filter(p=>gameRoster.has(p.name))

if(!selectingRoster&&visible.length===0){
let empty=document.createElement("div")
empty.textContent="No players rostered for this game. Click Edit Game Roster to add players."
box.appendChild(empty)
return
}

visible.forEach(p=>{

stats[p.name]=stats[p.name]||{goals:0}

let swing=isSwing(p)
let badge=swing?'<span class="swingBadge">SWING (JV+V)</span>':''
let toggleLabel=swing?"Unmark Swing":"Mark Swing"

let card=document.createElement("div")
card.className="playerCard"

if(selectingRoster){
let checked=gameRoster.has(p.name)?"checked":""
card.innerHTML=`
<input type="checkbox" ${checked} onchange="toggleGameRoster('${p.name}');renderRoster()" style="width:auto;margin-right:12px;transform:scale(1.5)">
<div>
<b>#${p.number} ${p.name}</b>${badge}<br>
${p.position}
<button onclick="toggleSwing('${p.name}')">${toggleLabel}</button>
</div>
`
}else{
card.innerHTML=`
<img src="https://via.placeholder.com/50">
<div>
<b>#${p.number} ${p.name}</b>${badge}<br>
${p.position}
<button onclick="goal('${p.name}')">Goal</button>
<button onclick="toggleSwing('${p.name}')">${toggleLabel}</button>
</div>
`
}

box.appendChild(card)

})

}

function goal(player){

stats[player].goals++

updateLeaders()

}

function updateLeaders(){

let leaders=document.getElementById("leaders")
leaders.innerHTML=""

let sorted=Object.entries(stats).sort((a,b)=>b[1].goals-a[1].goals)

sorted.slice(0,5).forEach(p=>{

let d=document.createElement("div")
d.innerText=p[0]+" - "+p[1].goals+" goals"
leaders.appendChild(d)

})

}

function score(team){

if(team=="home"){

homeScore.innerText=parseInt(homeScore.innerText)+1

}else{

awayScore.innerText=parseInt(awayScore.innerText)+1

}

}

function startClock(){

if(timer)return

timer=setInterval(()=>{

clock--
updateClock()

},1000)

}

function stopClock(){

clearInterval(timer)
timer=null

}

function updateClock(){

let m=Math.floor(clock/60)
let s=clock%60

document.getElementById("clock").innerText=m+":"+String(s).padStart(2,"0")

}

function updateSavePct(){

let saves=parseInt(savesEl().value)
let ga=parseInt(gaEl().value)

let pct=Math.round((saves/(saves+ga))*100)||0

document.getElementById("savePct").innerText="Save %: "+pct+"%"

}

function savesEl(){return document.getElementById("saves")}
function gaEl(){return document.getElementById("ga")}

function generateRecap(){

let recap="Final Score "+homeScore.innerText+"-"+awayScore.innerText

document.getElementById("recap").value=recap

}

populate()

countryEl().onchange=populateStates
stateEl().onchange=populateSchools

</script>

</body>
</html>
